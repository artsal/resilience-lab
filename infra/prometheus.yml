global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'event-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['event-service:8080']

  - job_name: 'processing-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['processing-service:8081']